workflows:
  dossier-inquira-ios:
    name: Dossier Inquira · iOS release
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Dossier Inquira
    environment:
      node: 22
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.pretvinsncs.inarentiersirst
      vars:
        APP_STORE_APPLE_ID: 6793540797
        BUNDLE_ID: 'com.pretvinsncs.inarentiersirst'
        XCODE_WORKSPACE: 'DossierInquira.xcworkspace'
        XCODE_SCHEME: 'DossierInquira'
    scripts:
      - name: Install node modules
        script: |
          corepack enable
          pnpm install --frozen-lockfile
      - name: Verify application code
        script: |
          pnpm typecheck
          pnpm lint
          pnpm test --runInBand
      - name: Install CocoaPods dependencies
        script: |
          cd ios && pod install
      - name: Configure Xcode signing
        script: |
          cd ios
          xcode-project use-profiles
      - name: Increment build number
        script: |
          cd $CM_BUILD_DIR/ios
          LATEST_BUILD_NUMBER=$(app-store-connect get-latest-app-store-build-number "$APP_STORE_APPLE_ID")
          agvtool new-version -all $(($LATEST_BUILD_NUMBER + 1))
      - name: Build ipa for distribution
        script: |
          xcode-project build-ipa \
            --workspace "$CM_BUILD_DIR/ios/$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    publishing:
      app_store_connect:
        auth: integration
        submit_to_app_store: true
        copyright: JACOB CAMPBELL
